<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道案内システム (入力機能拡張版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: calc(100% - 160px); }
        
        /* 操作パネルのスタイル調整 */
        #control-panel { 
            height: 160px; 
            background: #f8f9fa; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-row label { width: 70px; font-weight: bold; font-size: 14px; }
        .input-box { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 8px 16px; font-size: 14px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .btn-secondary { background: #6c757d; }
        #status { font-size: 13px; color: #666; margin-top: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="control-panel">
        <div class="input-row">
            <label>現在地:</label>
            <button id="gps-btn" class="btn btn-secondary">🛰️ GPSで取得</button>
            <input type="text" id="start-input" class="input-box" placeholder="または場所を入力（例：新宿駅）">
            <button id="set-start-btn" class="btn">設定</button>
        </div>

        <div class="input-row">
            <label>目的地:</label>
            <input type="text" id="end-input" class="input-box" placeholder="目的地を入力（例：東京駅）">
            <button id="set-end-btn" class="btn">ルート検索</button>
        </div>

        <div id="status">現在地と目的地を入力してください。</div>
    </div>

    <script>
        // --- 基本設定 ---
        const map = L.map('map').setView([35.6812, 139.7671], 14); // 初期位置：東京
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let startMarker = null;
        let endMarker = null;
        let routeControl = null;
        
        let userLocation = null;        // 現在地の緯度経度
        let destinationLatLng = null;   // 目的地の緯度経度
        let watchId = null;             // GPS監視用のID
        let lastInstruction = "";       // 音声案内の重複防止用

        // --- パターンA: GPSで現在地を取得する処理 ---
        document.getElementById('gps-btn').addEventListener('click', () => {
            // すでに文字入力されている場合はクリアする
            document.getElementById('start-input').value = "";
            
            if (!navigator.geolocation) {
                updateStatus("⚠️ お使いのブラウザはGPSに対応していません。");
                return;
            }

            updateStatus("GPS位置情報を取得中...");
            
            // 既存のGPS監視があれば一度止める
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition(function(position) {
                userLocation = L.latLng(position.coords.latitude, position.coords.longitude);
                
                // 現在地マーカーの描画・更新
                if (!startMarker) {
                    startMarker = L.marker(userLocation).addTo(map).bindPopup("現在地 (GPS)").openPopup();
                } else {
                    startMarker.setLatLng(userLocation).setPopupContent("現在地 (GPS)");
                }
                map.setView(userLocation, 16);
                updateStatus("GPSで現在地を特定しました。");

                // すでに目的地があれば自動でルート再計算（リルート対応）
                if (destinationLatLng) {
                    calculateRoute(userLocation, destinationLatLng);
                }
            }, function() {
                updateStatus("⚠️ GPSの取得に失敗しました。位置情報を許可するか、文字入力をお試しください。");
            }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        });

        // --- パターンB: 現在地を文字入力で指定する処理 ---
        document.getElementById('set-start-btn').addEventListener('click', () => {
            const query = document.getElementById('start-input').value.trim();
            if (!query) {
                updateStatus("⚠️ 現在地の場所を入力してください。");
                return;
            }
            
            // 文字入力に切り替えるため、GPSの自動監視はストップする
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            updateStatus(`現在地「${query}」を検索中...`);
            searchLocation(query, (latLng) => {
                userLocation = latLng;
                if (!startMarker) {
                    startMarker = L.marker(userLocation).addTo(map).bindPopup(`現在地: ${query}`).openPopup();
                } else {
                    startMarker.setLatLng(userLocation).setPopupContent(`現在地: ${query}`).openPopup();
                }
                map.setView(userLocation, 15);
                updateStatus(`現在地を設定しました: ${query}`);

                // すでに目的地があればルート計算
                if (destinationLatLng) {
                    calculateRoute(userLocation, destinationLatLng);
                }
            });
        });

        // --- 目的地の文字入力設定 ＆ ルート検索 ---
        document.getElementById('set-end-btn').addEventListener('click', () => {
            const query = document.getElementById('end-input').value.trim();
            if (!query) {
                updateStatus("⚠️ 目的地を入力してください。");
                return;
            }

            updateStatus(`目的地「${query}」を検索中...`);
            searchLocation(query, (latLng) => {
                destinationLatLng = latLng;
                if (!endMarker) {
                    endMarker = L.marker(destinationLatLng).addTo(map).bindPopup(`目的地: ${query}`).openPopup();
                } else {
                    endMarker.setLatLng(destinationLatLng).setPopupContent(`目的地: ${query}`).openPopup();
                }
                updateStatus(`目的地を設定しました: ${query}`);
                speak(`目的地を${query}に設定しました。`);

                // 現在地がすでに設定されていればルートを計算
                if (userLocation) {
                    calculateRoute(userLocation, destinationLatLng);
                } else {
                    updateStatus("目的地を設定しました。次に現在地（GPSまたは文字）を設定してください。");
                }
            });
        });

        // --- 共通機能：地名検索（ジオコーディング） ---
        function searchLocation(query, callback) {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
            
            fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    callback(L.latLng(lat, lon));
                } else {
                    updateStatus(`⚠️ 「${query}」が見つかりませんでした。別の名称を試してください。`);
                }
            })
            .catch(() => updateStatus("⚠️ 通信エラーが発生しました。"));
        }

        // --- 共通機能：ルート検索 ＆ 音声道案内 ---
        function calculateRoute(start, end) {
            if (routeControl) {
                map.removeControl(routeControl);
            }

            routeControl = L.Routing.control({
                waypoints: [start, end],
                serviceUrl: 'https://router.project-osrm.org/route/v1',
                routeWhileDragging: false,
                addWaypoints: false,
                //language: 'ja',
                show: false // ナビパネルは非表示（音声と画面下のステータスで伝えるため）
            }).addTo(map);

            routeControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                if (routes[0].instructions && routes[0].instructions.length > 0) {
                    const nextStep = routes[0].instructions[0];
                    const instructionText = nextStep.text;

                    // 新しい案内があれば音声で発話
                    if (instructionText !== lastInstruction) {
                        speak(instructionText);
                        lastInstruction = instructionText;
                    }
                    
                    updateStatus(`ルート確定：残り約${(summary.totalDistance / 1000).toFixed(1)}km ／ 次の案内: ${instructionText}`);
                }
            });
        }

        // --- 共通機能：音声合成（喋る機能は維持） ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }
    </script>
</body>
</html>
