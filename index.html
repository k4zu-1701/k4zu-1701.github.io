<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道案内システム (v2.6.0)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        
        #main-container { display: flex; width: 100%; height: calc(100% - 160px); position: relative; }
        #map { flex: 1; height: 100%; z-index: 1; }
        
        /* 左上のバージョン表示バッジ (v2.6.0) */
        #version-badge {
            position: absolute;
            top: 10px;
            left: 50px; 
            background: rgba(0, 0, 0, 0.75);
            color: #00ffcc;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 4px;
            border: 1px solid #00ffcc;
            z-index: 1000; 
            pointer-events: none; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #navi-panel {
            background: #222; color: #fff; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #navi-instruction { font-size: 26px; font-weight: bold; margin-bottom: 10px; color: #00ffcc; }
        #navi-distance { font-size: 20px; color: #ccc; }

        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #navi-panel { width: 320px; height: 100%; border-left: 4px solid #007bff; }
        }
        @media (orientation: portrait) {
            #main-container { flex-direction: column-reverse; }
            #navi-panel { width: 100%; height: 140px; border-bottom: 4px solid #007bff; }
            #navi-instruction { font-size: 20px; }
            #navi-distance { font-size: 16px; }
        }

        #control-panel { 
            height: 160px; background: #f8f9fa; padding: 12px; box-sizing: border-box; 
            display: flex; flex-direction: column; gap: 8px; box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            position: relative; z-index: 1000;
        }
        .input-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .input-row label { width: 60px; font-weight: bold; font-size: 13px; }
        .input-box { flex: 1; min-width: 150px; padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; }
        .select-box { padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; background: white; cursor: pointer; }
        .btn { padding: 6px 12px; font-size: 13px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .btn-secondary { background: #6c757d; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; }
        #status { font-size: 12px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="version-badge">v2.6.0</div>
        <div id="map"></div>
        <div id="navi-panel">
            <div id="navi-instruction">案内を開始してください</div>
            <div id="navi-distance">ーー 先</div>
        </div>
    </div>

    <div id="control-panel">
        <div class="input-row">
            <label>現在地:</label>
            <button id="gps-btn" class="btn btn-secondary">🛰️ GPS取得</button>
            <input type="text" id="start-input" class="input-box" placeholder="または場所を入力（例：新宿駅）">
            <button id="set-start-btn" class="btn">設定</button>
            <button id="follow-btn" class="btn btn-success">🔄 追従:ON</button>
        </div>

        <div class="input-row">
            <label>目的地:</label>
            <input type="text" id="end-input" class="input-box" placeholder="目的地を入力（例：東京駅）">
            <button id="set-end-btn" class="btn">ルート検索</button>
            <button id="sim-btn" class="btn btn-warning" disabled>▶️ デモ走行開始</button>
            <select id="speed-mode" class="select-box">
                <option value="1.1">🚶 徒歩モード (リアル時速4km)</option>
                <option value="11.1">🚗 自動車モード (快速時速40km)</option>
            </select>
        </div>
        <div id="status">現在地と目的地を設定してください。</div>
    </div>

    <script>
        const map = L.map('map').setView([35.6812, 139.7671], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);

        let startMarker = null, endMarker = null, routeControl = null;
        let userLocation = null, destinationLatLng = null, watchId = null;
        let lastInstruction = "", isFollowing = true; 

        let simTimer = null;
        let simRouteLines = [];      
        let simInstructions = [];    
        let currentDistanceMeters = 0; 
        let progressMeters = 0;      
        let isSimulating = false;

        // 固定用変数
        let lockedDirection = "straight";
        let lockedTurnMeters = 0;
        let lastDisplayUpdateTime = 0; 

        const followBtn = document.getElementById('follow-btn');
        followBtn.addEventListener('click', () => { isFollowing = !isFollowing; updateFollowButton(); });

        function updateFollowButton() {
            if (isFollowing) {
                followBtn.innerText = "🔄 追従:ON"; followBtn.className = "btn btn-success";
                if (userLocation) map.setView(userLocation, 17); 
            } else {
                followBtn.innerText = "🛑 追従:OFF"; followBtn.className = "btn btn-secondary";
            }
        }
        map.on('movestart', (e) => { if (!e.hard && isFollowing) { isFollowing = false; updateFollowButton(); } });

        // GPS取得
        document.getElementById('gps-btn').addEventListener('click', () => {
            stopSimulation(); document.getElementById('start-input').value = "";
            if (!navigator.geolocation) return updateStatus("⚠️ GPS非対応");
            updateStatus("GPS位置情報を取得中...");
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(function(position) {
                userLocation = L.latLng(position.coords.latitude, position.coords.longitude);
                updateLocationMarker("現在地 (GPS)");
                if (destinationLatLng) calculateRoute(userLocation, destinationLatLng);
            }, function() { updateStatus("⚠️ GPS取得失敗"); }, { enableHighAccuracy: true, timeout: 5000 });
        });

        // 手動・現在地
        document.getElementById('set-start-btn').addEventListener('click', () => {
            stopSimulation(); const query = document.getElementById('start-input').value.trim(); if (!query) return;
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            searchLocation(query, (latLng) => { userLocation = latLng; updateLocationMarker(`現在地: ${query}`); if (destinationLatLng) calculateRoute(userLocation, destinationLatLng); });
        });

        // 手動・目的地 
        document.getElementById('set-end-btn').addEventListener('click', () => {
            const query = document.getElementById('end-input').value.trim(); if (!query) return;
            searchLocation(query, (latLng) => {
                destinationLatLng = latLng;
                if (!endMarker) endMarker = L.marker(destinationLatLng).addTo(map).bindPopup(`目的地: ${query}`).openPopup();
                else endMarker.setLatLng(destinationLatLng).setPopupContent(`目的地: ${query}`);
                speak(`目的地を${query}に設定しました。`);
                if (userLocation) calculateRoute(userLocation, destinationLatLng);
            });
        });

        function updateLocationMarker(popupText) {
            if (!startMarker) startMarker = L.marker(userLocation).addTo(map).bindPopup(popupText).openPopup();
            else startMarker.setLatLng(userLocation).setPopupContent(popupText);
            if (isFollowing) map.setView(userLocation, 17);
        }

        function searchLocation(query, callback) {
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query))
            .then(res => res.json()).then(data => { if (data && data.length > 0) callback(L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon))); else updateStatus(`⚠️ 「${query}」不検出`); })
            .catch(() => updateStatus("⚠️ 通信エラー"));
        }

        function calculateRoute(start, end) {
            if (routeControl) map.removeControl(routeControl);
            
            routeControl = L.Routing.control({
                waypoints: [start, end], serviceUrl: 'https://router.project-osrm.org/route/v1',
                routeWhileDragging: false, addWaypoints: false, show: false
            }).addTo(map);

            routeControl.on('routesfound', function(e) {
                const route = e.routes[0];
                
                simRouteLines = route.coordinates;
                simInstructions = route.instructions;
                currentDistanceMeters = route.summary.totalDistance;
                
                if (!isSimulating) {
                    progressMeters = 0;
                    lockedDirection = "straight";
                    lockedTurnMeters = 0;
                    lastDisplayUpdateTime = 0;
                    document.getElementById('sim-btn').disabled = false;
                    updateStatus("ルート確定。デモ走行が可能です。");
                }
                
                updateNavigationDisplay(true); 
            });
        }

        // ★v2.6.0 コア修正：途中に「直線の点」があっても途切れずに前方をフルスキャンする
        function scanAheadWithTargetLock(currentMeters) {
            if (!simRouteLines || simRouteLines.length < 3) return { dir: "straight", turnAbsoluteMeters: 0 };

            // 交差点の頂点を【2m以上超えたら】確実にロック解除
            if (lockedDirection !== "straight" && currentMeters >= lockedTurnMeters + 2) {
                lockedDirection = "straight";
                lockedTurnMeters = 0;
            }

            let maxScanDistance = 120;
            if (lockedDirection !== "straight") {
                maxScanDistance = Math.min(120, Math.max(10, (lockedTurnMeters - currentMeters) + 10));
            }

            const pPre = getCoordinateAtDistance(Math.max(0, currentMeters - 4));
            const pCur = getCoordinateAtDistance(currentMeters);
            const vInX = pCur.lng - pPre.lng;
            const vInY = pCur.lat - pPre.lat;
            const lenIn = Math.sqrt(vInX * vInX + vInY * vInY);
            
            let foundDirection = "straight";
            let foundVertexMeters = 0; 
            let maxAngleFound = 0;

            if (lenIn > 0) {
                let currentIdx = getCoordinateIndexAtDistance(currentMeters);

                let accumulatedDist = 0;
                // break条件を変更：途中に平坦な直線ポイントがあってもループを回し続け、規定距離を網羅する
                for (let i = currentIdx; i < simRouteLines.length - 2; i++) {
                    const p1 = simRouteLines[i];
                    const p2 = simRouteLines[i + 1];
                    const p3 = simRouteLines[i + 2];

                    const d1 = L.latLng(p1).distanceTo(p2);
                    accumulatedDist += d1;
                    
                    // 120m制限を超えた時点で終了。それまでは直線ノードがあっても飛ばさない
                    if (accumulatedDist > maxScanDistance) {
                        break; 
                    }

                    const thisVertexMeters = getDistanceAtCoordinateIndex(i + 1);
                    // すでに通過した（2mより手前の）頂点はスルー
                    if (thisVertexMeters <= currentMeters - 2) continue;

                    const v1X = p2.lng - p1.lng;
                    const v1Y = p2.lat - p1.lat;
                    const v2X = p3.lng - p2.lng;
                    const v2Y = p3.lat - p2.lat;

                    const len1 = Math.sqrt(v1X * v1X + v1Y * v1Y);
                    const len2 = Math.sqrt(v2X * v2X + v2Y * v2Y);
                    if (len1 === 0 || len2 === 0) continue;

                    const dot = v1X * v2X + v1Y * v2Y;
                    const cosTheta = dot / (len1 * len2);
                    const angleDeg = Math.acos(Math.max(-1, Math.min(1, cosTheta))) * (180 / Math.PI);

                    // 22度以上の変化があり、その走査範囲の中で最も角度が大きいものを「一番近い交差点」として認識
                    if (angleDeg >= 22 && angleDeg > maxAngleFound) {
                        maxAngleFound = angleDeg;
                        foundVertexMeters = thisVertexMeters;

                        const cross = v1X * v2Y - v1Y * v2X;
                        if (cross > 0) {
                            foundDirection = angleDeg > 55 ? "left" : "slight-left";
                        } else {
                            foundDirection = angleDeg > 55 ? "right" : "slight-right";
                        }
                    }
                }
            }

            if (foundDirection !== "straight") {
                if (lockedDirection === "straight") {
                    lockedDirection = foundDirection;
                    lockedTurnMeters = foundVertexMeters;
                } else {
                    const discrepancy = Math.abs(lockedTurnMeters - foundVertexMeters);
                    if (discrepancy >= 15) {
                        lockedDirection = foundDirection;
                        lockedTurnMeters = foundVertexMeters;
                    }
                }
            }

            return { dir: lockedDirection, turnAbsoluteMeters: lockedTurnMeters };
        }

        function updateNavigationDisplay(forceUpdate = false) {
            if (!simRouteLines || simRouteLines.length === 0) return;

            const now = Date.now();
            const shouldUpdateUI = forceUpdate || (now - lastDisplayUpdateTime >= 1000);

            let text = "道なりに直進します";
            let distanceText = "ーー 先";

            if (progressMeters >= currentDistanceMeters - 3) {
                text = "目的地に到着しました";
                distanceText = "お疲れ様でした";
            } else {
                const scanResult = scanAheadWithTargetLock(progressMeters);

                if (scanResult.dir === "left") text = "次を左折します";
                else if (scanResult.dir === "right") text = "次を右折します";
                else if (scanResult.dir === "slight-left") text = "やや左方向です";
                else if (scanResult.dir === "slight-right") text = "やや右方向です";
                else text = "道なりに直進します";

                if (scanResult.dir !== "straight" && scanResult.turnAbsoluteMeters > 0) {
                    const dynamicDist = scanResult.turnAbsoluteMeters - progressMeters;

                    if (dynamicDist >= 1000) {
                        distanceText = `約 ${(dynamicDist / 1000).toFixed(1)} km 先`;
                    } else if (dynamicDist <= 5) { 
                        // ★ご指定要件：5m以内に入ったら「まもなくです」
                        distanceText = `まもなくです`;
                    } else {
                        distanceText = `あと ${Math.round(dynamicDist)} m 先`;
                    }
                } else {
                    const remainingTotal = Math.max(0, currentDistanceMeters - progressMeters);
                    if (remainingTotal >= 1000) {
                        distanceText = `目的地まで ${(remainingTotal / 1000).toFixed(1)} km`;
                    } else {
                        distanceText = `目的地まで ${Math.round(remainingTotal)} m`;
                    }
                }
            }

            if (shouldUpdateUI) {
                document.getElementById('navi-instruction').innerText = text;
                document.getElementById('navi-distance').innerText = distanceText;
                lastDisplayUpdateTime = now;
            }

            if (text !== lastInstruction) {
                speak(text);
                lastInstruction = text;
                document.getElementById('navi-instruction').innerText = text;
                document.getElementById('navi-distance').innerText = distanceText;
            }

            const remainingTotal = Math.max(0, currentDistanceMeters - progressMeters);
            updateStatus(`ナビ走行中... 全体の残り距離: ${(remainingTotal/1000).toFixed(2)} km`);
        }

        function getCoordinateIndexAtDistance(meters) {
            let currentDist = 0;
            for (let i = 0; i < simRouteLines.length - 1; i++) {
                const segmentDist = L.latLng(simRouteLines[i]).distanceTo(simRouteLines[i+1]);
                if (currentDist + segmentDist >= meters) {
                    return i;
                }
                currentDist += segmentDist;
            }
            return simRouteLines.length - 1;
        }

        function getDistanceAtCoordinateIndex(targetIndex) {
            let dist = 0;
            for (let i = 0; i < targetIndex && i < simRouteLines.length - 1; i++) {
                dist += L.latLng(simRouteLines[i]).distanceTo(simRouteLines[i+1]);
            }
            return dist;
        }

        function getCoordinateAtDistance(meters) {
            let currentDist = 0;
            for (let i = 0; i < simRouteLines.length - 1; i++) {
                const p1 = L.latLng(simRouteLines[i]);
                const p2 = L.latLng(simRouteLines[i+1]);
                const segmentDist = p1.distanceTo(p2);
                
                if (currentDist + segmentDist >= meters) {
                    const ratio = (meters - currentDist) / segmentDist;
                    return L.latLng(
                        p1.lat + (p2.lat - p1.lat) * ratio,
                        p1.lng + (p2.lng - p1.lng) * ratio
                    );
                }
                currentDist += segmentDist;
            }
            return L.latLng(simRouteLines[simRouteLines.length - 1]);
        }

        // シミュレーション(デモ走行)処理
        const simBtn = document.getElementById('sim-btn');
        simBtn.addEventListener('click', () => {
            if (isSimulating) {
                clearInterval(simTimer); isSimulating = false;
                simBtn.innerText = "▶️ デモ走行再開"; simBtn.className = "btn btn-warning";
            } else {
                if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
                isSimulating = true;
                simBtn.innerText = "⏸️ 一時停止"; simBtn.className = "btn btn-danger";
                isFollowing = true; updateFollowButton();

                simTimer = setInterval(() => {
                    const speedPerSecond = parseFloat(document.getElementById('speed-mode').value);
                    const speedPerDecisecond = speedPerSecond / 10; 

                    progressMeters += speedPerDecisecond;

                    if (progressMeters < currentDistanceMeters) {
                        userLocation = getCoordinateAtDistance(progressMeters);
                        if (startMarker) startMarker.setLatLng(userLocation).setPopupContent("現在地 (デモ走行中)");
                        if (isFollowing) map.setView(userLocation, 17);
                        updateNavigationDisplay(false); 
                    } else {
                        progressMeters = currentDistanceMeters;
                        updateNavigationDisplay(true);
                        stopSimulation();
                        document.getElementById('navi-instruction').innerText = "目的地に到着しました";
                        document.getElementById('navi-distance').innerText = "お疲れ様でした";
                        updateStatus("デモ走行を終了しました。");
                    }
                }, 100); 
            }
        });

        function stopSimulation() {
            clearInterval(simTimer); isSimulating = false; progressMeters = 0;
            lockedDirection = "straight"; lockedTurnMeters = 0; lastDisplayUpdateTime = 0;
            simBtn.innerText = "▶️ デモ走行開始"; simBtn.className = "btn btn-warning";
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP'; window.speechSynthesis.speak(utterance);
            }
        }
        function updateStatus(msg) { document.getElementById('status').innerText = msg; }
    </script>
</body>
</html>
