<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道案内システム (シミュレーションモード搭載)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        
        #main-container {
            display: flex;
            width: 100%;
            height: calc(100% - 160px); /* 操作パネルが高くなった分を調整 */
        }

        #map { flex: 1; height: 100%; }

        #navi-panel {
            background: #222;
            color: #fff;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #navi-instruction { font-size: 28px; font-weight: bold; margin-bottom: 10px; color: #00ffcc; }
        #navi-distance { font-size: 20px; color: #ccc; }

        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #navi-panel { width: 320px; height: 100%; border-left: 4px solid #007bff; }
        }
        @media (orientation: portrait) {
            #main-container { flex-direction: column-reverse; }
            #navi-panel { width: 100%; height: 140px; border-bottom: 4px solid #007bff; }
            #navi-instruction { font-size: 22px; }
            #navi-distance { font-size: 16px; }
        }

        /* 下部操作パネル */
        #control-panel { 
            height: 160px; 
            background: #f8f9fa; 
            padding: 12px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1000;
        }
        .input-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .input-row label { width: 60px; font-weight: bold; font-size: 13px; }
        .input-box { flex: 1; min-width: 150px; padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 6px 12px; font-size: 13px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .btn-secondary { background: #6c757d; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; }
        #status { font-size: 12px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="map"></div>
        <div id="navi-panel">
            <div id="navi-instruction">案内を開始してください</div>
            <div id="navi-distance">ーー km 先</div>
        </div>
    </div>

    <div id="control-panel">
        <div class="input-row">
            <label>現在地:</label>
            <button id="gps-btn" class="btn btn-secondary">🛰️ GPS取得</button>
            <input type="text" id="start-input" class="input-box" placeholder="または場所を入力（例：新宿駅）">
            <button id="set-start-btn" class="btn">設定</button>
            <button id="follow-btn" class="btn btn-success">🔄 追従:ON</button>
        </div>

        <div class="input-row">
            <label>目的地:</label>
            <input type="text" id="end-input" class="input-box" placeholder="目的地を入力（例：東京駅）">
            <button id="set-end-btn" class="btn">ルート検索</button>
            
            <button id="sim-btn" class="btn btn-warning" disabled>▶️ デモ走行開始</button>
        </div>

        <div id="status">現在地と目的地を設定すると、ルート検索とデモ走行が可能になります。</div>
    </div>

    <script>
        const map = L.map('map').setView([35.6812, 139.7671], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let startMarker = null;
        let endMarker = null;
        let routeControl = null;
        
        let userLocation = null;
        let destinationLatLng = null;
        let watchId = null;
        let lastInstruction = "";
        let isFollowing = true; 

        // ★シミュレーション用の変数
        let simInterval = null;      // タイマー用
        let simCoordinates = [];     // ルートの全座標を格納する配列
        let simIndex = 0;            // 現在どこを走っているかのインデックス
        let isSimulating = false;    // シミュレーション中フラグ

        // 追従ボタンの処理
        const followBtn = document.getElementById('follow-btn');
        followBtn.addEventListener('click', () => {
            isFollowing = !isFollowing;
            updateFollowButton();
        });

        function updateFollowButton() {
            if (isFollowing) {
                followBtn.innerText = "🔄 追従:ON";
                followBtn.className = "btn btn-success";
                if (userLocation) map.setView(userLocation, 17); // デモ中は少しズームを深くすると見やすい
            } else {
                followBtn.innerText = "🛑 追従:OFF";
                followBtn.className = "btn btn-secondary";
            }
        }

        map.on('movestart', (e) => {
            if (e.hard) return; 
            if (isFollowing) {
                isFollowing = false;
                updateFollowButton();
            }
        });

        // GPS取得
        document.getElementById('gps-btn').addEventListener('click', () => {
            stopSimulation();
            document.getElementById('start-input').value = "";
            if (!navigator.geolocation) return updateStatus("⚠️ GPS非対応");

            updateStatus("GPS位置情報を取得中...");
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition(function(position) {
                userLocation = L.latLng(position.coords.latitude, position.coords.longitude);
                updateLocationMarker("現在地 (GPS)");
                if (destinationLatLng) calculateRoute(userLocation, destinationLatLng);
            }, function() {
                updateStatus("⚠️ GPS取得失敗");
            }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        });

        // 現在地文字入力
        document.getElementById('set-start-btn').addEventListener('click', () => {
            stopSimulation();
            const query = document.getElementById('start-input').value.trim();
            if (!query) return;
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }

            searchLocation(query, (latLng) => {
                userLocation = latLng;
                updateLocationMarker(`現在地: ${query}`);
                if (destinationLatLng) calculateRoute(userLocation, destinationLatLng);
            });
        });

        // 目的地文字入力
        document.getElementById('set-end-btn').addEventListener('click', () => {
            const query = document.getElementById('end-input').value.trim();
            if (!query) return;

            searchLocation(query, (latLng) => {
                destinationLatLng = latLng;
                if (!endMarker) {
                    endMarker = L.marker(destinationLatLng).addTo(map).bindPopup(`目的地: ${query}`).openPopup();
                } else {
                    endMarker.setLatLng(destinationLatLng).setPopupContent(`目的地: ${query}`);
                }
                speak(`目的地を${query}に設定しました。`);
                if (userLocation) calculateRoute(userLocation, destinationLatLng);
            });
        });

        function updateLocationMarker(popupText) {
            if (!startMarker) {
                startMarker = L.marker(userLocation).addTo(map).bindPopup(popupText).openPopup();
            } else {
                startMarker.setLatLng(userLocation).setPopupContent(popupText);
            }
            if (isFollowing) map.setView(userLocation, 16);
        }

        function searchLocation(query, callback) {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
            fetch(url).then(res => res.json()).then(data => {
                if (data && data.length > 0) {
                    callback(L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon)));
                } else {
                    updateStatus(`⚠️ 「${query}」が見つかりません。`);
                }
            }).catch(() => updateStatus("⚠️ 通信エラー"));
        }

        // ルート検索
        function calculateRoute(start, end) {
            if (routeControl) map.removeControl(routeControl);

            routeControl = L.Routing.control({
                waypoints: [start, end],
                serviceUrl: 'https://router.project-osrm.org/route/v1', 
                routeWhileDragging: false,
                addWaypoints: false,
                show: false 
            }).addTo(map);

            routeControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                // ★シミュレーション用に、ルートの全線の座標配列を保存する
                if (!isSimulating) {
                    simCoordinates = routes[0].coordinates;
                    document.getElementById('sim-btn').disabled = false; // デモボタンを有効化
                    updateStatus("ルート確定。デモ走行が可能です。");
                }

                if (routes[0].instructions && routes[0].instructions.length > 0) {
                    const nextStep = routes[0].instructions[0];
                    let instructionText = nextStep.text;

                    if (instructionText.includes("Head")) instructionText = "直進して出発します";
                    if (instructionText.includes("Turn right")) instructionText = "次を右折します";
                    if (instructionText.includes("Turn left")) instructionText = "次を左折します";
                    if (instructionText.includes("You have arrived")) instructionText = "目的地に到着しました";

                    document.getElementById('navi-instruction').innerText = instructionText;
                    document.getElementById('navi-distance').innerText = `残り 約 ${(summary.totalDistance / 1000).toFixed(1)} km`;

                    if (instructionText !== lastInstruction) {
                        speak(instructionText);
                        lastInstruction = instructionText;
                    }
                }
            });
        }

        // ★新設: シミュレーション（デモ走行）のコントロール処理
        const simBtn = document.getElementById('sim-btn');
        simBtn.addEventListener('click', () => {
            if (isSimulating) {
                // 一時停止処理
                clearInterval(simInterval);
                isSimulating = false;
                simBtn.innerText = "▶️ デモ走行再開";
                simBtn.className = "btn btn-warning";
                updateStatus("デモ走行を一時停止しました。");
            } else {
                // 走行開始処理
                if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; } // リアルGPSは止める
                isSimulating = true;
                simBtn.innerText = "⏸️ 一時停止";
                simBtn.className = "btn btn-danger";
                isFollowing = true; // デモ開始時は自動追従オン
                updateFollowButton();

                // 最初からの場合はインデックスをリセット
                if (simIndex >= simCoordinates.length - 1) simIndex = 0;

                // タイマー起動（1秒ごとに次の座標へ進む）
                simInterval = setInterval(() => {
                    if (simIndex < simCoordinates.length) {
                        const coord = simCoordinates[simIndex];
                        userLocation = L.latLng(coord.lat, coord.lng); // 現在地を疑似更新
                        
                        updateLocationMarker("現在地 (デモ走行中)");
                        
                        // 現在地が動いたので、目的地までのルートとナビ情報を再計算
                        calculateRoute(userLocation, destinationLatLng);
                        
                        simIndex += 5; // ★進むスピード調整（数字を大きくすると早送りに。1だと徒歩、5だと自転車/車くらい）
                    } else {
                        stopSimulation();
                        updateStatus("目的地に到着したため、デモ走行を終了しました。");
                    }
                }, 1000);
            }
        });

        // シミュレーションを安全に完全停止する関数
        function stopSimulation() {
            clearInterval(simInterval);
            isSimulating = false;
            simIndex = 0;
            simBtn.innerText = "▶️ デモ走行開始";
            simBtn.className = "btn btn-warning";
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }
    </script>
</body>
</html>
