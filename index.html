<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易・道案内システム</title>
    
    <!-- Leaflet (地図ライブラリ) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Routing Machine (ルート検索プラグイン) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        /* 画面いっぱいに地図を表示する設定 */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <!-- 地図が表示される枠 -->
    <div id="map"></div>

    <script>
        // 1. 地図の初期化（最初は日本全体が見えるくらいの位置）
        const map = L.map('map').setView([35.6812, 139.7671], 13);

        // 2. 背景の地図画像（OpenStreetMap）を読み込む
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. 目的地を設定（例：東京駅の緯度・経度）
        // ※ここをご自身の好きな場所の緯度・経度に変えられます
        const destination = [35.681236, 139.767125]; 
        L.marker(destination).addTo(map).bindPopup("<b>目的地（東京駅）</b>").openPopup();

        // 4. スマホやPCのGPS（位置情報）を取得する
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const startLat = position.coords.latitude;  // 現在地の緯度
                const startLng = position.coords.longitude; // 現在地の経度

                // 現在地にピンを立てる
                L.marker([startLat, startLng]).addTo(map).bindPopup("あなたの現在地").openPopup();

                // 5. 現在地から目的地までのルートを計算して描画
                L.Routing.control({
                    waypoints: [
                        L.latLng(startLat, startLng), // 出発地（現在地）
                        L.latLng(destination[0], destination[1]) // 目的地
                    ],
                    routeWhileDragging: true,
                    language: 'ja' // 案内を日本語にする
                }).addTo(map);

                // 地図の表示範囲をルートに合わせる
                map.setView([startLat, startLng], 14);

            }, function() {
                alert("位置情報の取得に失敗しました。位置情報の利用を許可してください。");
            });
        } else {
            alert("お使いのブラウザはGPS（位置情報）に対応していません。");
        }
    </script>
</body>
</html>
